<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Spell Checker: BODO</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --border: #000000;
      --button-bg: #000000;
      --button-text: #ffffff;
      --button-hover: #333333;
      --accent: #f0f0f0;
    }

    [data-theme="dark"] {
      --bg: #1a1a1a;
      --text: #ffffff;
      --border: #ffffff;
      --button-bg: #ffffff;
      --button-text: #000000;
      --button-hover: #cccccc;
      --accent: #333333;
    }

    * {
      box-sizing: border-box;
      transition: background-color 0.3s, color 0.3s;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    h2 {
      margin: 0;
      font-size: 1.8rem;
      border-bottom: 3px solid var(--border);
      padding-bottom: 10px;
    }

    .theme-toggle {
      background: var(--accent);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .theme-toggle:hover {
      opacity: 0.8;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .action-buttons button {
      flex: 1;
      margin-top: 0;
      padding: 10px 20px;
      font-size: 14px;
    }

    .btn-secondary {
      background: var(--accent) !important;
      color: var(--text) !important;
      border: 2px solid var(--border);
    }

    .btn-secondary:hover {
      opacity: 0.7;
    }

    form {
      margin-bottom: 30px;
    }

    textarea {
      width: 100%;
      padding: 15px;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      border-radius: 8px;
      resize: vertical;
      min-height: 120px;
    }

    textarea:focus {
      outline: none;
      border-color: var(--button-bg);
    }

    button {
      margin-top: 15px;
      padding: 12px 30px;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
    }

    button:hover {
      background: var(--button-hover);
    }

    h3 {
      margin-top: 30px;
    }

    h3.underlined {
      border-bottom: 2px solid var(--border);
      padding-bottom: 10px;
    }

    ul {
      list-style-type: none;
      padding: 0;
    }

    li {
      padding: 10px 15px;
      margin: 8px 0;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .arrow {
      color: var(--border);
      font-weight: bold;
    }

    .corrected-box {
      background: var(--accent);
      padding: 20px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .status {
      padding: 15px 20px;
      background: var(--accent);
      border-radius: 8px;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      body {
        padding: 15px;
      }

      h2 {
        font-size: 1.4rem;
      }

      .header {
        flex-direction: row;
        gap: 10px;
        align-items: center;
      }

      h2 {
        font-size: 1rem;
      }

      h3 {
        font-size: 0.9rem;
      }

      .theme-toggle {
        padding: 6px 12px;
        font-size: 12px;
      }

      textarea {
        font-size: 14px;
        padding: 12px;
      }

      button {
        width: 100%;
        padding: 14px;
      }

      li {
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Auto Spell Checker: BODO Language</h2>
    <button class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">&#9728;</span>
      <span id="theme-text">Dark</span>
    </button>
  </div>
<h3>Bi-LSTM with Attention</h3>
  <form method="POST" id="spellForm">
    <textarea name="sentence" placeholder="Enter your sentence here...">{{ original }}</textarea><br>
    <div class="action-buttons">
      <button type="submit">Check Spelling</button>
      <button type="button" class="btn-secondary" onclick="clearResults()">Clear</button>
      <button type="button" class="btn-secondary" onclick="recheck()">Recheck</button>
    </div>
  </form>

  {% if mistakes %}
    <h3 class="underlined">Mistakes Found:</h3>
    <ul>
      {% for w,c in mistakes %}
      <li>
        <strong>{{ w }}</strong>
        <span class="arrow">&rarr;</span>
        <strong>{{ c }}</strong>
      </li>
      {% endfor %}
    </ul>

    <h3 class="underlined">Suggested Correction:</h3>
    <div class="corrected-box">{{ corrected }}</div>
  {% elif status %}
    <div class="status">{{ status }}</div>
  {% endif %}

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('theme-icon');
      const text = document.getElementById('theme-text');
      const isDark = html.getAttribute('data-theme') === 'dark';

      if (isDark) {
        html.setAttribute('data-theme', 'light');
        icon.innerHTML = '&#9728;';
        text.textContent = 'Dark';
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        icon.innerHTML = '&#9790;';
        text.textContent = 'Light';
        localStorage.setItem('theme', 'dark');
      }
    }

    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
        const icon = document.getElementById('theme-icon');
        const text = document.getElementById('theme-text');
        if (savedTheme === 'dark') {
          icon.innerHTML = '&#9790;';
          text.textContent = 'Light';
        }
      }
    })();

    function clearResults() {
      document.querySelector('textarea').value = '';
      const results = document.querySelectorAll('ul, .corrected-box, .status');
      results.forEach(el => el.remove());
    }

    function recheck() {
      const textarea = document.querySelector('textarea');
      if (textarea.value.trim()) {
        document.getElementById('spellForm').submit();
      }
    }
  </script>
</body>
</html>
